name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  phase-1-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: product_lookup
          POSTGRES_USER: product_lookup
          POSTGRES_PASSWORD: product_lookup
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U product_lookup -d product_lookup"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://product_lookup:product_lookup@127.0.0.1:5433/product_lookup

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Apply database migrations
        run: pnpm db:migrate

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build
