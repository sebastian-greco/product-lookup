services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://product_lookup:product_lookup@postgres:5432/product_lookup
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - app-node_modules:/app/node_modules
    command: sh -c "pnpm install --frozen-lockfile --force && pnpm db:setup && pnpm dev"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3000/health\").then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"'
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: product_lookup
      POSTGRES_USER: product_lookup
      POSTGRES_PASSWORD: product_lookup
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U product_lookup -d product_lookup']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  app-node_modules:
  postgres-data:
