services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: product_lookup
      POSTGRES_USER: product_lookup
      POSTGRES_PASSWORD: product_lookup
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U product_lookup -d product_lookup']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
